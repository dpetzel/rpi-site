site_name: Raspberry Pi Info
site_url: https://rpi.dpetzel.info
site_description: A collection of Raspberry Pi information, guides, and notes.
site_author: dpetzel

repo_url: https://github.com/dpetzel/rpi-site
repo_name: dpetzel/rpi-site
edit_uri: edit/main/docs/

theme:
  name: mkdocs
  color_mode: auto
  user_color_mode_toggle: true
  locale: en

plugins:
  - search

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Guides: guides/index.md
