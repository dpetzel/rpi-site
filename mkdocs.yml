site_name: RPi Repair Reference
site_url: https://rpi.dpetzel.info
site_description: Raspberry Pi board-level repair reference - component inventories, voltage maps, test points, and failure modes.
site_author: dpetzel

repo_url: https://github.com/dpetzel/rpi-site
repo_name: dpetzel/rpi-site
edit_uri: edit/main/docs/

watch:
  - ./docs

theme:
  name: material
  custom_dir: overrides
  features:
    - navigation.tabs
    - navigation.path
    - toc.integrate
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: blue
      accent: light green
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: light green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra:
  social: []

nav:
  - Models:
    - Pi 5:
      - Overview: pi5/index.md
      - Rev 1.1:
        - Overview: pi5/rev-1.1/index.md
        - Test Points: pi5/rev-1.1/test-points.md
      - Rev 1.0:
        - Overview: pi5/rev-1.0/index.md
        - Test Points: pi5/rev-1.0/test-points.md
      - Components:  pi5/components.md
      - PMIC: pi5/pmic/index.md
    - Pi 4:
      - Overview: pi4/index.md
      - Model B:
        - Overview: pi4/model-b/index.md
        - Rev 1.5:
          - Overview: pi4/model-b/rev-1.5/index.md
          - Test Points: pi4/model-b/rev-1.5/test-points.md
          - Components: pi4/model-b/rev-1.5/components.md
        - Rev 1.4:
          - Overview: pi4/model-b/rev-1.4/index.md
          - Test Points: pi4/model-b/rev-1.4/test-points.md
        - Rev 1.2:
          - Overview: pi4/model-b/rev-1.2/index.md
          - Test Points: pi4/model-b/rev-1.2/test-points.md
        - Rev 1.1:
          - Overview: pi4/model-b/rev-1.1/index.md
          - Test Points: pi4/model-b/rev-1.1/test-points.md
    - Pi 3:
      - Overview: pi3/index.md
      - 3B:
        - Overview: pi3/3b/index.md
        - Rev 1.2:
          - Overview: pi3/3b/rev-1.2/index.md
          - Test Points: pi3/3b/rev-1.2/test-points.md
      - 3B+:
        - Overview: pi3/3b-plus/index.md
        - Rev 1.3:
          - Overview: pi3/3b-plus/rev-1.3/index.md
          - Components: pi3/3b-plus/rev-1.3/components.md
          - Test Points: pi3/3b-plus/rev-1.3/test-points.md
          - Voltage Reference: pi3/3b-plus/rev-1.3/voltage_reference.md
      - 3A+:
        - Overview: pi3/3a-plus/index.md
        - Rev 1.0:
          - Overview: pi3/3a-plus/rev-1.0/index.md
          - Test Points: pi3/3a-plus/rev-1.0/test-points.md
  - Guides:
    - Updating EEProm: guides/update_eeprom.md
  - About: about.md
  - Disclaimer: disclaimer.md
  - Disclosure: disclosure.md
  - Contributing: contributing.md
