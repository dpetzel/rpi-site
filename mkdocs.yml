site_name: RPi Repair Reference
site_url: https://rpi.dpetzel.info
site_description: Raspberry Pi board-level repair reference - component inventories, voltage maps, test points, and failure modes.
site_author: dpetzel

theme:
  name: material
  custom_dir: overrides
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.path
    - toc.integrate
    - search.suggest
    - search.highlight
  palette:
    - scheme: default
      primary: green
      accent: light green
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: green
      accent: light green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search

markdown_extensions:
  - tables
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra:
  social: []

nav:
  - Pi 3:
    - pi3/index.md
    - 3B:
      - pi3/3b/index.md
      - Components: pi3/3b/components.md
      - Voltages: pi3/3b/voltages.md
      - Test Points: pi3/3b/test-points.md
      - Failure Modes: pi3/3b/failure-modes.md
    - 3B+:
      - pi3/3b-plus/index.md
      - Components: pi3/3b-plus/components.md
      - Voltages: pi3/3b-plus/voltages.md
      - Test Points: pi3/3b-plus/test-points.md
      - Failure Modes: pi3/3b-plus/failure-modes.md
    - 3A+:
      - pi3/3a-plus/index.md
      - Components: pi3/3a-plus/components.md
      - Voltages: pi3/3a-plus/voltages.md
      - Test Points: pi3/3a-plus/test-points.md
      - Failure Modes: pi3/3a-plus/failure-modes.md
  - Pi 4:
    - pi4/index.md
    - Model B:
      - pi4/model-b/index.md
      - Components: pi4/model-b/components.md
      - Voltages: pi4/model-b/voltages.md
      - Test Points: pi4/model-b/test-points.md
      - Failure Modes: pi4/model-b/failure-modes.md
  - Pi 5:
    - pi5/index.md
    - Model B:
      - pi5/model-b/index.md
      - Components: pi5/model-b/components.md
      - Voltages: pi5/model-b/voltages.md
      - Test Points: pi5/model-b/test-points.md
      - Failure Modes: pi5/model-b/failure-modes.md
  - Guides:
    - guides/index.md
  - About: about.md
  - Disclaimer: disclaimer.md
  - Disclosure: disclosure.md
  - Contributing: contributing.md
